volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    restart: always
    env_file:
      - .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: kisame2011/taski_backend
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/backend_static
  frontend:
    image: kisame2011/taski_frontend
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/frontend_static
  gateway:
    image: kisame2011/taski_gateway
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/staticfiles/
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8080:80"
