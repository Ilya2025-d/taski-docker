server {
  listen 80;
  server_name ilyahost.sytes.net;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }
  location / {
    proxy_set_header Host $host;
    proxy_pass http://frontend:8000;
  }
}